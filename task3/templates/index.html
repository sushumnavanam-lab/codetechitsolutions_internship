<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h3>🤖  Chatbot</h3>

    <form action="/get" method="post">
        <textarea name="msg" class="chat-box" placeholder="Type your message..."></textarea>
        <br>
        <input type="submit" value="Send">
    </form>

    {% if reply %}
    <p>{{ reply|safe }}</p>
    {% endif %}

</body>
</html>
